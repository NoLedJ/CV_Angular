<div class="main" (click)="afficherExperience(experience()?.id)" (keydown.enter)="afficherExperience(experience()?.id)" (keydown.space)="afficherExperience(experience()?.id)">
  <div class="photo-container">
    <img alt="Expérience" class="zoom" [src]="experience()?.photo_url" />
  </div>
  <div class="content">
    <div class="content-infos">
      <h4 class="poste">{{ experience()?.poste }}</h4>
      <span class="gras">{{ experience()?.projet }}</span>
      <span>{{ experience()?.periode }}</span>
      <span class="lieu">{{ experience()?.lieu }}</span>
    </div>
    <button class="bouton-valider">Voir l'expérience</button>
  </div>
</div>
