@if (afficherModalExperience() || (afficherMentionsLegales())) {
  <div [@afficherModal] class="modal"(click)="fermerModal($event)" (keydown.enter)="fermerModal($event)">
    @if (afficherModalExperience()) {
      <app-modal-experience
        [(experiences_texte)]="experiences_texte"
        [(youtubeVideosArray)]="youtubeVideosArray"
        [(experienceId)]="experienceSelectionnee"
        [(afficherModalExperience)]="afficherModalExperience">
      </app-modal-experience>
    } @else if (afficherMentionsLegales()) {
      <app-mentions-legales
        [(afficherMentionsLegales)]="afficherMentionsLegales">
      </app-mentions-legales>
    }
  </div>
}

<app-intro [@openIntroDebut]></app-intro>
<main>
  <div class="content">
    <app-competences></app-competences>
    <app-experiences
      [(experienceSelectionnee)]="experienceSelectionnee"
      [(afficherModalExperience)]="afficherModalExperience">
    </app-experiences>
    <app-divers
      [(afficherMentionsLegales)]="afficherMentionsLegales">
    </app-divers>
  </div>
</main>
